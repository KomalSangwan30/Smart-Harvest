<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Harvest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #9cdec4; }
        .input-field {
            width: 100%; border: 1px solid #d1d5db; border-radius: 10px;
            padding: 10px 14px; font-size: 14px; font-family: 'Poppins', sans-serif;
            color: #374151; outline: none; transition: border-color 0.2s;
        }
        .input-field:focus { border-color: #16a34a; box-shadow: 0 0 0 3px rgba(22,163,74,0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">

<div class="w-full max-w-md">
    <div class="text-center mb-8">
        <div class="w-14 h-14 bg-green-600 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-3">🌾</div>
        <h1 class="text-2xl font-bold text-gray-800">Smart Harvest</h1>
        <p class="text-gray-700 text-sm">Sign in to your account</p>
    </div>

    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8">

        {% if messages %}
            {% for msg in messages %}
            <div class="bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-xl mb-5">{{ msg }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-xs font-semibold text-gray-500 mb-1">Username</label>
                <input type="text" name="username" class="input-field" placeholder="Enter your username" required autofocus>
            </div>
            <div class="mb-6">
                <label class="block text-xs font-semibold text-gray-500 mb-1">Password</label>
                <input type="password" name="password" class="input-field" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl text-sm transition-colors">
                Sign In
            </button>
        </form>

        <p class="text-center text-gray-400 text-sm mt-5">
            Don't have an account?
            <a href="/register/" class="text-green-600 font-semibold hover:underline">Register</a>
        </p>
    </div>
</div>

</body>
</html>
